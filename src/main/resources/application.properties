spring.application.name=veritusbot
server.port=8083

# Application Environment Configuration
# Valores posibles: desarrollo, produccion, pruebas
# - desarrollo: Muestra todos los logs (DEBUG, INFO, WARNING, ERROR)
# - pruebas: Muestra logs detallados (INFO, WARNING, ERROR)
# - produccion: Solo logs esenciales (WARNING, ERROR)
app.environment=desarrollo

# Graceful Shutdown Configuration
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=30s

# SQL Server Configuration
spring.datasource.url=jdbc:sqlserver://localhost:14333;databaseName=veritus;encrypt=true;trustServerCertificate=true
spring.datasource.username=sa
spring.datasource.password=SqlServer!2026#
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.SQLServer2012Dialect
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Thread Pool Configuration
spring.task.execution.pool.core-size=3
spring.task.execution.pool.max-size=3
spring.task.execution.pool.queue-capacity=100

# Working Hours Configuration
# Si es true: Respeta el rango horario (08:00-20:00)
# Si es false: Busca sin importar el rango horario (24/7)
app.working-hours.enabled=true

# PJUD Website Configuration
# URL base del sitio de Poder Judicial
app.pjud.url=https://oficinajudicialvirtual.pjud.cl/home/index.php

# Browser Configuration for Playwright
# headless=true (recomendado para VPS, servers sin GUI) - sin interfaz visual, mas rapido
# headless=false (desarrollo local) - con interfaz visual para debugging
app.scraper.browser.headless=true

# Proxy Configuration for browser instances
# Formato server sugerido: http://host:port o socks5://host:port

proxi1=http://129.80.77.234:8080
userProxi1=miusuario
passProxi1=mi-password-segura


# Scraper Configuration
# Maximum number of concurrent threads per person (one browser per thread processing different years)
app.scraper.max-threads=1

# Reprocessing Configuration
# Months to revalidate already processed people
# Phase 1: Search in Santiago courts
app.reprocess.phase1.months=6

# Phase 2: Search in other courts
app.reprocess.phase2.months=12

# ==================== JWT Configuration ====================
# Secret key para firmar JWTs (CAMBIAR EN PRODUCCION)
# HS512 requiere minimo 512 bits (64 bytes)
app.jwt.secret=change-this-jwt-secret-now-64-bytes-minimum-for-hs512-security-2026-prod-key

# Expiracion del token en milisegundos (86400000 = 24 horas)
app.jwt.expiration=86400000

# ==================== CORS Configuration ====================
# Origenes permitidos (separados por coma en caso de multiples)
app.cors.allowed-origins=http://localhost:3000,http://localhost:4200,http://localhost:8080

